<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAcademy — Ваш ИИ-ассистент для бизнеса</title>
<meta name="description" content="Персональный ИИ-ассистент для бизнеса. Работает в Telegram и WhatsApp 24/7. Обучение по Zoom, комьюнити, внедрение под ключ.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════ RESET ═══════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

:root {
  --bg: #0A0A0A;
  --gold: #F5A623;
  --gold-light: #FFB84D;
  --gold-dim: rgba(245,166,35,0.1);
  --gold-border: rgba(245,166,35,0.2);
  --text: #ffffff;
  --text-grey: #888888;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }

/* ═══════════════ NAVIGATION ═══════════════ */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 16px 0;
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  font-size: 22px; font-weight: 800;
  letter-spacing: -0.5px;
}
.logo span { color: var(--gold); }
.nav-links { display: flex; gap: 32px; }
.nav-links a {
  color: var(--text-grey);
  font-size: 15px;
  font-weight: 500;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--gold); }
.nav-cta {
  background: linear-gradient(135deg, var(--gold), #E8941A);
  color: var(--bg);
  padding: 10px 24px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 700;
  box-shadow: 0 4px 20px rgba(245,166,35,0.3);
  transition: all 0.2s;
}
.nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(245,166,35,0.4); }
.burger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 8px;
}
.burger span {
  width: 24px; height: 2px;
  background: var(--text);
  border-radius: 2px;
}

/* ═══════════════ SECTIONS WITH BG IMAGES ═══════════════ */
.section-bg {
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Parallax-like fixed backgrounds */
.section-fixed-bg {
  background-attachment: fixed;
}

/* Dark overlay gradient for text readability on images */
.section-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, 
    rgba(10,10,10,0.3) 0%, 
    rgba(10,10,10,0.5) 50%, 
    rgba(10,10,10,0.3) 100%
  );
  pointer-events: none;
}

/* Interactive layer */
.section-content {
  position: relative;
  z-index: 5;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Invisible but clickable hotspots for buttons */
.hotspot {
  position: absolute;
  cursor: pointer;
  border-radius: 12px;
  transition: all 0.25s ease;
  background: transparent;
  z-index: 10;
}

/* Hero specific hotspots */
.hero-hotspot-cta {
  bottom: 22%;
  left: 50%;
  transform: translateX(-50%) translateX(-90px);
  width: 220px;
  height: 56px;
}
.hero-hotspot-cta:hover {
  background: rgba(245,166,35,0.15);
  box-shadow: 0 0 30px rgba(245,166,35,0.3);
}

.hero-hotspot-trial {
  bottom: 22%;
  left: 50%;
  transform: translateX(-50%) translateX(90px);
  width: 280px;
  height: 56px;
}

/* CTA section hotspots */
.cta-hotspot-test {
  bottom: 35%;
  left: 50%;
  transform: translateX(-50%) translateX(-120px);
  width: 200px;
  height: 56px;
}
.cta-hotspot-test:hover {
  background: rgba(245,166,35,0.15);
  box-shadow: 0 0 30px rgba(245,166,35,0.3);
}

.cta-hotspot-question {
  bottom: 35%;
  left: 50%;
  transform: translateX(-50%) translateX(120px);
  width: 200px;
  height: 56px;
}

/* Pricing hotspot */
.pricing-hotspot {
  bottom: 12%;
  right: 8%;
  width: 280px;
  height: 56px;
}
.pricing-hotspot:hover {
  background: rgba(245,166,35,0.15);
  box-shadow: 0 0 30px rgba(245,166,35,0.3);
}

/* ═══════════════ SCROLL INDICATOR ═══════════════ */
.scroll-hint {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  color: rgba(245,166,35,0.5);
  font-size: 24px;
  animation: bounce 2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(10px); }
}

/* ═══════════════ FOOTER ═══════════════ */
.footer {
  padding: 32px 24px;
  text-align: center;
  background: var(--bg);
  border-top: 1px solid rgba(255,255,255,0.06);
}
.footer .logo { margin-bottom: 8px; }
.footer-text { color: #444; font-size: 13px; }
.footer-made {
  color: #555;
  font-size: 13px;
  margin-top: 8px;
  font-style: italic;
}

/* ═══════════════ MOBILE MENU ═══════════════ */
.mobile-menu {
  display: none;
  position: fixed;
  top: 56px; left: 0; right: 0;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 20px 24px;
  z-index: 999;
  flex-direction: column;
  gap: 16px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  color: var(--text-grey);
  font-size: 16px;
  font-weight: 500;
  padding: 8px 0;
}
.mobile-menu a:hover { color: var(--gold); }

/* ═══════════════ RESPONSIVE ═══════════════ */
@media (max-width: 968px) {
  .nav-links { display: none; }
  .burger { display: flex; }
  .section-fixed-bg { background-attachment: scroll; }
  /* Show full image without cropping on mobile */
  .section-bg {
    min-height: 0;
    height: auto;
    background-size: contain;
    background-position: center top;
    background-repeat: no-repeat;
    aspect-ratio: 16 / 9;
    background-color: var(--bg);
  }
  .section-content {
    min-height: 0;
    position: absolute;
    inset: 0;
  }
}

@media (max-width: 768px) {
  .section-bg {
    aspect-ratio: 3 / 4;
  }
  .hero-hotspot-cta, .hero-hotspot-trial,
  .cta-hotspot-test, .cta-hotspot-question {
    width: 46%;
    height: 48px;
    bottom: 20%;
  }
  .hero-hotspot-cta {
    left: 27%;
    transform: none;
  }
  .hero-hotspot-trial {
    left: 73%;
    transform: translateX(-100%);
  }
  .cta-hotspot-test {
    left: 27%;
    bottom: 32%;
    transform: none;
  }
  .cta-hotspot-question {
    left: 73%;
    bottom: 32%;
    transform: translateX(-100%);
  }
  .pricing-hotspot {
    bottom: 12%;
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    width: 50%;
  }
}

@media (max-width: 480px) {
  .section-bg {
    aspect-ratio: 3 / 4.5;
  }
  .hero-hotspot-cta, .hero-hotspot-trial {
    height: 36px;
    bottom: 17%;
  }
}

/* Selection */
::selection { background: var(--gold); color: var(--bg); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-border); }
</style>
</head>
<body>

<!-- ═══ NAVIGATION ═══ -->
<nav class="nav">
  <div class="nav-inner">
    <a href="#hero" class="logo">V<span>Academy</span></a>
    <ul class="nav-links">
      <li><a href="#what">Возможности</a></li>
      <li><a href="#who">Кому подходит</a></li>
      <li><a href="#compare">Сравнение</a></li>
      <li><a href="#pricing">Тарифы</a></li>
      <li><a href="#contact">Контакты</a></li>
    </ul>
    <a href="#pricing" class="nav-cta">Попробовать →</a>
    <div class="burger" id="burger">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="#what">Возможности</a>
  <a href="#who">Кому подходит</a>
  <a href="#compare">Сравнение</a>
  <a href="#pricing">Тарифы</a>
  <a href="#contact">Контакты</a>
  <a href="#pricing" style="color: var(--gold); font-weight: 700;">Попробовать бесплатно →</a>
</div>

<!-- ═══ 1. HERO ═══ -->
<section class="section-bg section-fixed-bg" id="hero" style="background-image: url('slide1-hero.png');">
  <div class="section-overlay"></div>
  <div class="section-content">
    <!-- Hotspot: "Узнать больше" button -->
    <a href="#what" class="hotspot hero-hotspot-cta" title="Узнать больше"></a>
    <!-- Hotspot: "Попробовать бесплатно" button -->
    <a href="#pricing" class="hotspot hero-hotspot-trial" title="Попробовать бесплатно"></a>
  </div>
  <div class="scroll-hint">⌄</div>
</section>

<!-- ═══ 2. WHAT WE DO ═══ -->
<section class="section-bg section-fixed-bg" id="what" style="background-image: url('slide2-what-we-do.png');">
  <div class="section-overlay"></div>
  <div class="section-content"></div>
</section>

<!-- ═══ 3. WHO ═══ -->
<section class="section-bg section-fixed-bg" id="who" style="background-image: url('slide3-who.png');">
  <div class="section-overlay"></div>
  <div class="section-content"></div>
</section>

<!-- ═══ 4. COMPARISON ═══ -->
<section class="section-bg section-fixed-bg" id="compare" style="background-image: url('slide4-comparison.png');">
  <div class="section-overlay"></div>
  <div class="section-content"></div>
</section>

<!-- ═══ 5. PRICING ═══ -->
<section class="section-bg section-fixed-bg" id="pricing" style="background-image: url('slide5-pricing.png');">
  <div class="section-overlay"></div>
  <div class="section-content">
    <!-- Hotspot: "Начать бесплатно" button -->
    <a href="#contact" class="hotspot pricing-hotspot" title="Начать бесплатно"></a>
  </div>
</section>

<!-- ═══ 6. CTA / CONTACT ═══ -->
<section class="section-bg section-fixed-bg" id="contact" style="background-image: url('slide6-cta.png');">
  <div class="section-overlay"></div>
  <div class="section-content">
    <!-- Hotspot: "Тест 12 часов" button -->
    <a href="https://t.me/vardges_13" class="hotspot cta-hotspot-test" target="_blank" title="Тест 12 часов"></a>
    <!-- Hotspot: "Задать вопрос" button -->
    <a href="https://t.me/vardges_13" class="hotspot cta-hotspot-question" target="_blank" title="Задать вопрос"></a>
  </div>
</section>

<!-- ═══ FOOTER ═══ -->
<footer class="footer">
  <div class="logo">V<span>Academy</span></div>
  <div class="footer-text">© 2026 VAcademy. ИИ-ассистенты для бизнеса.</div>
  <div class="footer-made">Этот лендинг создал мой ИИ-ассистент ✦</div>
</footer>

<script>
// ═══ MOBILE MENU ═══
const burger = document.getElementById('burger');
const mobileMenu = document.getElementById('mobile-menu');
burger.addEventListener('click', () => mobileMenu.classList.toggle('open'));
mobileMenu.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => mobileMenu.classList.remove('open'));
});

// ═══ SMOOTH SCROLL ═══
document.querySelectorAll('a[href^="#"]').forEach(link => {
  link.addEventListener('click', (e) => {
    const href = link.getAttribute('href');
    if (href === '#') return;
    const target = document.querySelector(href);
    if (target) {
      e.preventDefault();
      const offset = 60;
      const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  });
});

// ═══ SUBTLE PARALLAX ON SCROLL ═══
let ticking = false;
window.addEventListener('scroll', () => {
  if (!ticking) {
    requestAnimationFrame(() => {
      const scrolled = window.pageYOffset;
      document.querySelectorAll('.section-fixed-bg').forEach(section => {
        const offset = section.offsetTop;
        const height = section.offsetHeight;
        if (scrolled + window.innerHeight > offset && scrolled < offset + height) {
          const speed = 0.3;
          const yPos = -(scrolled - offset) * speed;
          section.style.backgroundPositionY = `calc(50% + ${yPos * 0.1}px)`;
        }
      });
      ticking = false;
    });
    ticking = true;
  }
});
</script>

</body>
</html>
