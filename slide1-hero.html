<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1280px; height: 720px;
    background: #0A0A0A;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .glow-bg {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,166,35,0.12) 0%, rgba(245,166,35,0.03) 40%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(40px);
  }
  .glow-orb {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
    filter: blur(60px);
  }
  .orb1 { top: 10%; right: 5%; }
  .orb2 { bottom: 5%; left: 8%; }
  .nav {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 28px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .logo {
    font-size: 22px; font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .logo span { color: #F5A623; }
  .nav-links {
    display: flex; gap: 36px;
  }
  .nav-links a {
    color: #888; font-size: 15px; font-weight: 500;
    text-decoration: none;
  }
  .content {
    text-align: center;
    z-index: 5;
    max-width: 900px;
    padding: 0 40px;
  }
  .badge {
    display: inline-flex;
    align-items: center; gap: 8px;
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.25);
    color: #F5A623;
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 14px; font-weight: 600;
    margin-bottom: 32px;
  }
  .badge::before {
    content: ''; width: 6px; height: 6px;
    background: #F5A623; border-radius: 50%;
    box-shadow: 0 0 8px #F5A623;
  }
  h1 {
    font-size: 64px; font-weight: 800;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -2px;
    margin-bottom: 24px;
  }
  h1 .gold {
    background: linear-gradient(135deg, #F5A623, #FFB84D);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 19px;
    color: #999;
    line-height: 1.6;
    font-weight: 400;
    max-width: 680px;
    margin: 0 auto 40px;
  }
  .cta-row {
    display: flex; gap: 16px;
    justify-content: center;
    margin-bottom: 36px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #F5A623, #E8941A);
    color: #0A0A0A;
    padding: 16px 40px;
    border-radius: 12px;
    font-size: 16px; font-weight: 700;
    border: none;
    box-shadow: 0 8px 32px rgba(245,166,35,0.3);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    padding: 16px 40px;
    border-radius: 12px;
    font-size: 16px; font-weight: 600;
  }
  .features-row {
    display: flex; gap: 32px;
    justify-content: center;
  }
  .feature {
    display: flex; align-items: center; gap: 8px;
    color: #777; font-size: 14px; font-weight: 500;
  }
  .feature-icon {
    color: #F5A623;
  }
  .star {
    position: absolute;
    color: rgba(245,166,35,0.3);
    font-size: 20px;
  }
  .s1 { top: 15%; left: 12%; }
  .s2 { top: 25%; right: 15%; }
  .s3 { bottom: 20%; left: 18%; }
  .s4 { bottom: 30%; right: 10%; }
</style>
</head>
<body>
  <div class="glow-bg"></div>
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>
  <div class="star s1">✦</div>
  <div class="star s2">✦</div>
  <div class="star s3">✦</div>
  <div class="star s4">✦</div>

  <nav class="nav">
    <div class="logo">V<span>Academy</span></div>
    <div class="nav-links">
      <a href="#">Возможности</a>
      <a href="#">Тарифы</a>
      <a href="#">Обучение</a>
      <a href="#">Контакты</a>
    </div>
  </nav>

  <div class="content">
    <div class="badge">ИИ-ассистент нового поколения</div>
    <h1>Ваш ИИ-ассистент<br><span class="gold">для бизнеса</span></h1>
    <p class="subtitle">Персональный помощник, который закрывает задачи программиста, дизайнера, аналитика и коуча. Работает прямо в вашем мессенджере 24/7.</p>
    <div class="cta-row">
      <button class="btn-primary">Узнать больше →</button>
      <button class="btn-secondary">Попробовать бесплатно</button>
    </div>
    <div class="features-row">
      <div class="feature"><span class="feature-icon">●</span> Telegram & WhatsApp</div>
      <div class="feature"><span class="feature-icon">●</span> Zoom обучение</div>
      <div class="feature"><span class="feature-icon">●</span> Комьюнити</div>
    </div>
  </div>
</body>
</html>
