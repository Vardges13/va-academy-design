<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1280px; height: 720px;
    background: #0A0A0A;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .glow-bg {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,166,35,0.1) 0%, rgba(245,166,35,0.02) 40%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(50px);
  }
  .star {
    position: absolute;
    color: rgba(245,166,35,0.3);
    font-size: 18px;
  }
  .s1 { top: 18%; left: 15%; }
  .s2 { top: 30%; right: 18%; }
  .s3 { bottom: 25%; left: 22%; }
  .content {
    text-align: center;
    z-index: 5;
    max-width: 700px;
  }
  .icon-big {
    font-size: 56px;
    margin-bottom: 24px;
  }
  h2 {
    font-size: 52px; font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    margin-bottom: 20px;
    line-height: 1.1;
  }
  h2 .gold {
    background: linear-gradient(135deg, #F5A623, #FFB84D);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    font-size: 18px;
    color: #888;
    margin-bottom: 40px;
    font-style: italic;
  }
  .cta-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 48px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #F5A623, #E8941A);
    color: #0A0A0A;
    padding: 16px 44px;
    border-radius: 12px;
    font-size: 16px; font-weight: 700;
    border: none;
    box-shadow: 0 8px 32px rgba(245,166,35,0.3);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    padding: 16px 44px;
    border-radius: 12px;
    font-size: 16px; font-weight: 600;
  }
  .contacts {
    display: flex;
    gap: 40px;
    justify-content: center;
    margin-bottom: 40px;
  }
  .contact {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .contact-icon {
    width: 48px; height: 48px;
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .contact-label {
    color: #666;
    font-size: 13px;
  }
  .contact-value {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
  }
  .footer {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    text-align: center;
  }
  .footer-logo {
    font-size: 20px; font-weight: 800;
    color: #fff;
    margin-bottom: 8px;
  }
  .footer-logo span { color: #F5A623; }
  .footer-text {
    color: #444;
    font-size: 13px;
  }
  .made-with {
    color: #555;
    font-size: 13px;
    margin-top: 8px;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="glow-bg"></div>
  <div class="star s1">✦</div>
  <div class="star s2">✦</div>
  <div class="star s3">✦</div>

  <div class="content">
    <div class="icon-big">🚀</div>
    <h2>Готовы начать?<br><span class="gold">Попробуйте бесплатно</span></h2>
    <p class="tagline">Передайте рутину ИИ-ассистенту — оставьте себе главное</p>
    <div class="cta-row">
      <button class="btn-primary">Тест 12 часов →</button>
      <button class="btn-secondary">Задать вопрос</button>
    </div>
    <div class="contacts">
      <div class="contact">
        <div class="contact-icon">💬</div>
        <div class="contact-label">Мессенджер</div>
        <div class="contact-value">Telegram</div>
      </div>
      <div class="contact">
        <div class="contact-icon">📧</div>
        <div class="contact-label">Почта</div>
        <div class="contact-value">info@va-academy.ru</div>
      </div>
      <div class="contact">
        <div class="contact-icon">🎥</div>
        <div class="contact-label">Обучение</div>
        <div class="contact-value">Zoom каждую неделю</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-logo">V<span>Academy</span></div>
    <div class="footer-text">© 2026 VAcademy. ИИ-ассистенты для бизнеса.</div>
    <div class="made-with">Этот лендинг создал мой ИИ-ассистент ✦</div>
  </div>
</body>
</html>
